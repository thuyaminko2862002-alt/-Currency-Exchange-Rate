<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Currency Exchange (MMK)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 380px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 25px; font-size: 22px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #7f8c8d; font-size: 14px; }
        select, input { width: 100%; padding: 12px; border: 2px solid #edf2f7; border-radius: 12px; font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box; }
        select:focus, input:focus { border-color: #3498db; }
        .result-box { background: #ebf5ff; padding: 20px; border-radius: 12px; text-align: center; margin-top: 10px; }
        .result-box span { display: block; color: #7f8c8d; font-size: 14px; margin-bottom: 5px; }
        #totalResult { font-size: 24px; font-weight: bold; color: #2980b9; }
        .rate-info { margin-top: 20px; font-size: 11px; color: #bdc3c7; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h2>Currency Converter</h2>

    <div class="form-group">
        <label>နိုင်ငံရွေးချယ်ပါ</label>
        <select id="currency" onchange="calculate()">
            <option value="USD">USA (USD)</option>
            <option value="THB" selected>Thai Baht (THB)</option>
            <option value="MYR">Malaysia (MYR)</option>
            <option value="KRW">Korea (KRW)</option>
            <option value="JPY">Japan (JPY)</option>
            <option value="SGD">Singapore (SGD)</option>
        </select>
    </div>

    <div class="form-group">
        <label id="amountLabel">Thai Baht ပမာဏထည့်ပါ</label>
        <input type="number" id="amount" placeholder="0.00" oninput="calculate()">
    </div>

    <div class="result-box">
        <span>မြန်မာကျပ်ငွေ (ခန့်မှန်းခြေ)</span>
        <div id="totalResult">0 MMK</div>
    </div>

    <div class="rate-info">
        * အထက်ပါနှုန်းထားများသည် ၂၀၂၆ ဧပြီလ ခန့်မှန်းခြေဖြစ်ပြီး <br> ပြင်ပပေါက်ဈေးနှင့် အနည်းငယ် ကွာဟနိုင်ပါသည်။
    </div>
</div>

<script>
    // လဲလှယ်နှုန်းထားများ (1 Unit = ... MMK)
    const rates = {
        USD: 4500,   // 1 USD = 4500 ကျပ်
        THB: 132.45,    // 1 THB = 132.45 ကျပ်
        MYR: 950,    // 1 MYR = 950 ကျပ်
        KRW: 3.3,    // 1 KRW = 3.3 ကျပ်
        JPY: 30,     // 1 JPY = 30 ကျပ်
        SGD: 3350    // 1 SGD = 3350 ကျပ်
    };

    function calculate() {
        const currency = document.getElementById('currency').value;
        const amount = document.getElementById('amount').value;
        const resultText = document.getElementById('totalResult');
        const label = document.getElementById('amountLabel');

        // Label ကို update လုပ်ခြင်း
        const names = {
            USD: "US Dollar", THB: "Thai Baht", MYR: "Malaysian Ringgit",
            KRW: "Korean Won", JPY: "Japanese Yen", SGD: "Singapore Dollar"
        };
        label.innerText = names[currency] + " ပမာဏထည့်ပါ";

        // တွက်ချက်ခြင်း
        if (amount > 0) {
            let total = amount * rates[currency];
            resultText.innerText = total.toLocaleString() + " MMK";
        } else {
            resultText.innerText = "0 MMK";
        }
    }
</script>

</body>
</html>
